<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>考勤检查</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f2f5}
.card{background:#fff;border-radius:16px;padding:40px 30px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);max-width:360px;width:90%}
h2{font-size:22px;margin-bottom:8px;color:#333}
p{color:#999;font-size:14px;margin-bottom:24px}
.btn{display:block;width:100%;padding:18px;background:#1976d2;color:#fff;border:none;border-radius:12px;font-size:18px;cursor:pointer;transition:background .2s}
.btn:active{background:#1565c0}
.btn.running{background:#ff9800}
.btn.done{background:#4caf50}
.status{margin-top:16px;font-size:13px;color:#999;min-height:20px}
</style>
</head>
<body>
<div class="card">
<h2>考勤检查</h2>
<p>点击按钮，等30秒收到微信通知</p>
<button class="btn" id="btn" onclick="trigger()">查询打卡</button>
<div class="status" id="status"></div>
</div>

<script>
const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/019eaacc-2b5d-7660-8b5c-391648dbd372';
const POLL_URL = 'https://jsonblob.com/api/jsonBlob/019eaacc-2b5d-7660-8b5c-391648dbd372';

async function trigger() {
  const btn = document.getElementById('btn');
  const st = document.getElementById('status');

  btn.textContent = '发送中...';
  btn.className = 'btn running';

  try {
    // 清除旧状态
    await fetch(BLOB_URL, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd: '', time: new Date().toISOString()})
    });

    // 等1秒确保写入
    await new Promise(r => setTimeout(r, 1000));

    // 设置触发信号
    await fetch(BLOB_URL, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({cmd: 'check', time: new Date().toISOString()})
    });

    btn.textContent = '已触发!';
    btn.className = 'btn done';
    st.textContent = 'PC 正在检测，微信稍后收到结果';
  } catch(e) {
    btn.textContent = '查询打卡';
    btn.className = 'btn';
    st.textContent = '失败: ' + e.message;
  }
}
</script>
</body>
</html>
