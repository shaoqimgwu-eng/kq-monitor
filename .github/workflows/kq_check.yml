name: Attendance Check

on:
  push:
    branches: [master]
  schedule:
    # Beijing 17:10 = UTC 09:10 Mon-Fri
    - cron: '10 9 * * 1-5'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run attendance check
        run: python check.py
